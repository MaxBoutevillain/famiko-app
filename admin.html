<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famiko Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #881337;
  --primary-light: #fce7ec;
  --bg: #FAFAF7;
  --white: #ffffff;
  --text: #1d2d44;
  --muted: #6b7280;
  --border: #e5e7eb;
  --danger: #dc2626;
  --success: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* HEADER */
header { background: var(--primary); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-family: 'Caprasimo', cursive; color: white; font-size: 20px; }
header span { color: rgba(255,255,255,0.7); font-size: 13px; }
#cnt { color: white; font-weight: 600; }

/* LAYOUT */
.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 280px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.sidebar-top input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font: 13px 'Inter', sans-serif; outline: none; color: var(--text); }
.sidebar-top input:focus { border-color: var(--primary); }
.btn-new { width: 100%; padding: 10px; border-radius: 8px; background: var(--primary); color: white; border: none; font: 600 13px 'Inter', sans-serif; cursor: pointer; }
.btn-new:hover { background: #6f0f2e; }
.list { overflow-y: auto; flex: 1; }
.item { padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background .1s; }
.item:hover { background: #fafafa; }
.item.active { background: var(--primary-light); border-left: 3px solid var(--primary); }
.item .emoji { font-size: 20px; width: 26px; text-align: center; flex-shrink: 0; }
.item .info strong { display: block; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
.item .info span { font-size: 11px; color: var(--muted); }
.badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 500; }
.badge-p { background: #fef3c7; color: #92400e; }
.badge-f { background: #dcfce7; color: #166534; }
.empty-list { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

/* DETAIL */
.detail { flex: 1; overflow-y: auto; padding: 28px 32px; }
.placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; }
.placeholder svg { opacity: .25; }
.placeholder p { font-size: 15px; }

/* FORM */
.form-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.form-head h2 { font-family: 'Caprasimo', cursive; font-size: 20px; color: var(--primary); }
.form-actions { display: flex; gap: 8px; }
.btn { padding: 9px 16px; border-radius: 8px; font: 500 13px 'Inter', sans-serif; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 5px; transition: all .15s; white-space: nowrap; }
.btn-save { background: var(--primary); color: white; }
.btn-save:hover { background: #6f0f2e; }
.btn-del { background: transparent; color: var(--danger); border: 1.5px solid #fecaca; }
.btn-del:hover { background: #fef2f2; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 700px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1/-1; }
.fg label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.fg input, .fg textarea, .fg select {
  padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 8px;
  font: 14px 'Inter', sans-serif; color: var(--text); outline: none; background: var(--white); width: 100%;
}
.fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--primary); }
.fg textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.pills { display: flex; flex-wrap: wrap; gap: 7px; }
.pill { padding: 5px 11px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; user-select: none; transition: all .12s; }
.pill.on { background: var(--primary-light); border-color: var(--primary); color: var(--primary); font-weight: 600; }
.toggle-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.toggle { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
.toggle input { display: none; }
.track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background .2s; }
.track:before { content: ''; position: absolute; width: 15px; height: 15px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; }
.toggle input:checked + .track { background: var(--primary); }
.toggle input:checked + .track:before { transform: translateX(17px); }

/* CONFIRM */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.confirm { background: var(--white); border-radius: 14px; padding: 28px 24px; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.confirm .icon { font-size: 32px; margin-bottom: 10px; }
.confirm h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.confirm p { color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; justify-content: center; }

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 11px 16px; border-radius: 9px; font: 500 13px 'Inter', sans-serif; color: white; background: var(--text); box-shadow: 0 4px 12px rgba(0,0,0,.15); transform: translateY(50px); opacity: 0; transition: all .25s; z-index: 200; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { background: var(--success); }
.toast.err { background: var(--danger); }

/* SPINNER */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* PHOTO UPLOAD */
.photo-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color .15s; }
.photo-zone:hover { border-color: var(--primary); }
.photo-preview { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.photo-placeholder { width: 80px; height: 80px; border-radius: 8px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.photo-info { flex: 1; }
.photo-info p { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.photo-info small { font-size: 12px; color: var(--muted); }
.btn-upload { padding: 7px 14px; border-radius: 7px; background: var(--primary-light); color: var(--primary); border: none; font: 600 12px 'Inter', sans-serif; cursor: pointer; }
.uploading { opacity: .6; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>famiko admin</h1>
  <span><span id="cnt">—</span> activités</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <input id="q" placeholder="🔍 Rechercher…">
      <button class="btn-new" id="btnNew">+ Nouvelle activité</button>
    </div>
    <div class="list" id="list">
      <div class="empty-list"><div class="spin"></div></div>
    </div>
  </div>
  <div class="detail" id="detail">
    <div class="placeholder">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <p>Clique sur une activité pour la modifier</p>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="confirm">
    <div class="icon">🗑️</div>
    <h3>Supprimer cette activité ?</h3>
    <p id="confirmText">Cette action est irréversible.</p>
    <div class="confirm-btns">
      <button class="btn" style="border:1.5px solid var(--border);color:var(--muted)" id="btnCancelDel">Annuler</button>
      <button class="btn btn-del" id="btnConfirmDel">Supprimer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var URL = 'https://ylezmayjfkrjysvfkayc.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsZXptYXlqZmtyanlzdmZrYXljIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzM4NTYxMCwiZXhwIjoyMDg4OTYxNjEwfQ.JSlGnrDnO0B7FVhN78eLSHuYq6yGZAQ4nDhcWbhoeb8';

var all = [], current = null, delId = null;

// API
function api(path, method, body) {
  return fetch(URL + '/rest/v1/' + path, {
    method: method || 'GET',
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || 'Erreur ' + r.status); });
    return r.text().then(function(t) { return t ? JSON.parse(t) : null; });
  });
}

// Toast
var toastT;
function toast(msg, type) {
  clearTimeout(toastT);
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + (type||'');
  toastT = setTimeout(function(){ el.className = 'toast'; }, 3000);
}

// Load
function load() {
  document.getElementById('list').innerHTML = '<div class="empty-list"><div class="spin"></div></div>';
  api('activities?select=*&order=title.asc').then(function(data) {
    all = data || [];
    document.getElementById('cnt').textContent = all.length;
    renderList(all);
  }).catch(function(e) {
    document.getElementById('list').innerHTML = '<div class="empty-list">⚠️ ' + e.message + '</div>';
  });
}

// Render list
function renderList(items) {
  var el = document.getElementById('list');
  if (!items.length) { el.innerHTML = '<div class="empty-list">Aucune activité</div>'; return; }
  el.innerHTML = '';
  items.forEach(function(a) {
    var d = document.createElement('div');
    d.className = 'item' + (current && current.id === a.id ? ' active' : '');
    d.innerHTML = '<div class="emoji">'+(a.emoji||'📌')+'</div><div class="info"><strong>'+(a.title||'—')+'</strong><span>'+(a.category||'')+' &nbsp;<span class="badge '+(a.is_premium?'badge-p':'badge-f')+'">'+(a.is_premium?'Premium':'Gratuit')+'</span></span></div>';
    d.addEventListener('click', function() { current = a; renderList(filterItems()); renderForm(a); });
    el.appendChild(d);
  });
}

function filterItems() {
  var q = document.getElementById('q').value.toLowerCase();
  return all.filter(function(a) { return !q || (a.title||'').toLowerCase().includes(q) || (a.category||'').toLowerCase().includes(q); });
}

document.getElementById('q').addEventListener('input', function() { renderList(filterItems()); });
document.getElementById('btnNew').addEventListener('click', function() { current = null; renderList(filterItems()); renderForm(null); });

// Render form
var CATS = ['','Sensoriel','Créative','Motricité','Motricité fine','Calme','Nature','Scientifique','Dév. perso','Ensemble'];
var AGES = [['0-6m','0–6 mois'],['6-12m','6–12 mois'],['1-3','1–3 ans'],['3-6','3–6 ans'],['6-9','6–9 ans'],['9+','9 ans+']];

function e(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function renderForm(a) {
  var isNew = !a;
  var ages = a && a.age_ranges ? a.age_ranges : [];

  document.getElementById('detail').innerHTML =
    '<div class="form-head">' +
      '<h2>'+(isNew ? 'Nouvelle activité' : '✏️ Modifier')+'</h2>' +
      '<div class="form-actions">' +
        (!isNew ? '<button class="btn btn-del" id="fDel">🗑 Supprimer</button>' : '') +
        '<button class="btn btn-save" id="fSave">💾 Enregistrer</button>' +
      '</div>' +
    '</div>' +
    '<div class="grid">' +
      '<div class="fg"><label>Emoji</label><input id="fEmoji" value="'+e(a?a.emoji:'')+'" placeholder="🎨" maxlength="4"></div>' +
      '<div class="fg"><label>Durée (min)</label><input id="fDur" type="number" value="'+(a&&a.duration?a.duration:'')+'" placeholder="15" min="1"></div>' +
      '<div class="fg full"><label>Photo</label>' +
        '<div class="photo-zone" id="photoZone" onclick="document.getElementById(\'fileInput\').click()">' +
          (a&&a.image_url ? '<img class="photo-preview" id="photoPreview" src="'+e(a.image_url)+'">' : '<div class="photo-placeholder" id="photoPreview">🖼️</div>') +
          '<div class="photo-info"><p id="photoName">'+(a&&a.image_url?'Photo actuelle':'Aucune photo')+' </p><small>JPG ou PNG · 2 Mo max</small></div>' +
          '<button class="btn-upload" type="button">Choisir</button>' +
        '</div>' +
        '<input type="file" id="fileInput" accept="image/*" style="display:none">' +
      '</div>' +
      '<div class="fg full"><label>Titre</label><input id="fTitle" value="'+e(a?a.title:'')+'" placeholder="Nom de l\'activité"></div>' +
      '<div class="fg full"><label>Description</label><textarea id="fDesc" rows="3">'+e(a?a.description:'')+'</textarea></div>' +
      '<div class="fg full"><label>Hook enfant</label><input id="fHook" value="'+e(a?a.hook_child:'')+'" placeholder="Tu veux construire quelque chose ?"></div>' +
      '<div class="fg"><label>Catégorie</label><select id="fCat">'+CATS.map(function(c){return '<option value="'+c+'"'+(a&&a.category===c?' selected':'')+'>'+( c||'Choisir…')+'</option>';}).join('')+'</select></div>' +
      '<div class="fg"><label>Lieu</label><select id="fLoc"><option value="indoor"'+(a&&a.location==='indoor'?' selected':'')+'>🏠 Intérieur</option><option value="outdoor"'+(a&&a.location==='outdoor'?' selected':'')+'>🌿 Extérieur</option><option value="both"'+(a&&a.location==='both'?' selected':'')+'>🌍 Les deux</option></select></div>' +
      '<div class="fg full"><label>Tranches d\'âge</label><div class="pills" id="agePills">'+AGES.map(function(ag){return '<span class="pill'+(ages.indexOf(ag[0])!==-1?' on':'')+'" data-v="'+ag[0]+'">'+ag[1]+'</span>';}).join('')+'</div></div>' +
      '<div class="fg full"><label>Matériel (virgules)</label><input id="fMat" value="'+e(a&&a.materials?(Array.isArray(a.materials)?a.materials.join(', '):a.materials):'')+'" placeholder="Papier, crayons…"></div>' +
      '<div class="fg full"><label>Étapes (une par ligne)</label><textarea id="fSteps" rows="5">'+e(a&&a.steps?(Array.isArray(a.steps)?a.steps.join('\n'):a.steps):'')+'</textarea></div>' +
      '<div class="fg full"><label>Conseil psychomotricien</label><textarea id="fPsycho" rows="3">'+e(a?a.psycho_tip:'')+'</textarea></div>' +
      '<div class="fg full"><label>Statut</label><div class="toggle-row"><label class="toggle"><input type="checkbox" id="fPrem"'+(a&&a.is_premium?' checked':'')+' ><span class="track"></span></label><span id="premLbl">'+(a&&a.is_premium?'Premium 🔒':'Gratuit')+'</span></div></div>' +
    '</div>';

  document.getElementById('fPrem').addEventListener('change', function() {
    document.getElementById('premLbl').textContent = this.checked ? 'Premium 🔒' : 'Gratuit';
  });
  document.getElementById('agePills').addEventListener('click', function(ev) {
    var p = ev.target.closest('.pill');
    if (p) p.classList.toggle('on');
  });

  // Upload photo
  var pendingImageUrl = a ? (a.image_url || null) : null;
  document.getElementById('fileInput').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { toast('Image trop lourde (max 2 Mo)', 'err'); return; }
    var zone = document.getElementById('photoZone');
    zone.classList.add('uploading');
    document.getElementById('photoName').textContent = 'Upload en cours…';
    var ext = file.name.split('.').pop();
    var filename = 'activity-' + Date.now() + '.' + ext;
    var formData = new FormData();
    formData.append('', file, filename);
    fetch(URL + '/storage/v1/object/activity-images/' + filename, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY },
      body: file
    }).then(function(r) {
      if (!r.ok) throw new Error('Upload échoué');
      pendingImageUrl = URL + '/storage/v1/object/public/activity-images/' + filename;
      var preview = document.getElementById('photoPreview');
      if (preview.tagName === 'DIV') {
        var img = document.createElement('img');
        img.className = 'photo-preview';
        img.id = 'photoPreview';
        img.src = pendingImageUrl;
        preview.replaceWith(img);
      } else {
        preview.src = pendingImageUrl;
      }
      document.getElementById('photoName').textContent = file.name;
      zone.classList.remove('uploading');
      toast('Photo uploadée ✓', 'ok');
    }).catch(function(err) {
      zone.classList.remove('uploading');
      document.getElementById('photoName').textContent = 'Erreur upload';
      toast('Erreur : ' + err.message, 'err');
    });
  });

  document.getElementById('fSave').addEventListener('click', function() { saveForm(a ? a.id : null, pendingImageUrl); });
  if (!isNew) {
    document.getElementById('fDel').addEventListener('click', function() {
      delId = a.id;
      document.getElementById('confirmText').textContent = '"'+a.title+'" sera supprimée définitivement.';
      document.getElementById('overlay').classList.add('open');
    });
  }
}

function saveForm(id, imageUrl) {
  var title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Le titre est obligatoire', 'err'); return; }
  var ages = [];
  document.querySelectorAll('#agePills .pill.on').forEach(function(p){ ages.push(p.dataset.v); });
  var payload = {
    emoji: document.getElementById('fEmoji').value.trim(),
    title: title,
    description: document.getElementById('fDesc').value.trim(),
    hook_child: document.getElementById('fHook').value.trim(),
    category: document.getElementById('fCat').value,
    location: document.getElementById('fLoc').value,
    duration: parseInt(document.getElementById('fDur').value)||null,
    age_ranges: ages,
    materials: document.getElementById('fMat').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
    steps: document.getElementById('fSteps').value.split('\n').map(function(s){return s.trim();}).filter(Boolean),
    psycho_tip: document.getElementById('fPsycho').value.trim(),
    is_premium: document.getElementById('fPrem').checked,
    image_url: imageUrl || null
  };
  var p = id ? api('activities?id=eq.'+id, 'PATCH', payload) : api('activities', 'POST', payload);
  p.then(function(res) {
    toast(id ? 'Activité mise à jour ✓' : 'Activité créée ✓', 'ok');
    if (!id && res && res[0]) current = res[0];
    load();
  }).catch(function(err){ toast('Erreur : '+err.message, 'err'); });
}

// Delete
document.getElementById('btnCancelDel').addEventListener('click', function(){ document.getElementById('overlay').classList.remove('open'); });
document.getElementById('btnConfirmDel').addEventListener('click', function() {
  api('activities?id=eq.'+delId, 'DELETE').then(function() {
    toast('Activité supprimée', 'ok');
    document.getElementById('overlay').classList.remove('open');
    current = null;
    document.getElementById('detail').innerHTML = '<div class="placeholder"><p>Sélectionne une activité</p></div>';
    load();
  }).catch(function(e){ toast('Erreur : '+e.message, 'err'); });
});
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') document.getElementById('overlay').classList.remove('open'); });

load();
</script>
</body>
</html>
